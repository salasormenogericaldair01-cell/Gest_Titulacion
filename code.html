<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Sistema de Registro de Proyectos de Titulación</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Hanken Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Font Awesome for Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Hanken Grotesk', sans-serif;
    }
  </style>
<style data-purpose="layout-and-colors">
    /* Gradient background similar to the reference image */
    .bg-login-gradient {
      background: radial-gradient(circle at center, #f0f4f8 0%, #d9e2ec 100%);
    }
    
    /* Academic Professional design system tokens: ROUND_FOUR (approx 1rem/16px) */
    .rounded-custom {
      border-radius: 1rem;
    }

    .shadow-custom {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="bg-login-gradient min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: LoginCard -->
<main class="bg-white w-full max-w-md p-8 md:p-10 rounded-custom shadow-custom border border-gray-100" data-purpose="login-container" id="login-card">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-8">
<!-- Graduation Cap Icon in Circle -->
<div class="inline-flex items-center justify-center w-24 h-24 rounded-full border-2 border-slate-200 bg-white mb-4 overflow-hidden" data-purpose="header-icon">
<i class="fas fa-graduation-cap text-slate-700 text-5xl"></i>
</div>
<!-- Titles -->
<h1 class="text-[#1e3a8a] text-2xl font-bold leading-tight mb-2">
        Sistema de Registro de Proyectos de Titulación
      </h1>
<p class="text-slate-500 text-sm font-medium">
        Inicie sesión para continuar
      </p>
</header>
<!-- END: HeaderSection -->
<hr class="border-t border-slate-100 mb-8"/>
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" data-purpose="authentication-form" id="login-form" method="POST">
<!-- Usuario Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700" for="usuario">
          Usuario
        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
<i class="fas fa-user"></i>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors placeholder:text-slate-400" id="usuario" name="usuario" placeholder="Ingrese su usuario" required="" type="text"/>
</div>
</div>
<!-- Contraseña Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700" for="contrasena">
          Contraseña
        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
<i class="fas fa-lock"></i>
</span>
<input class="block w-full pl-10 pr-10 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors placeholder:text-slate-400" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña" required="" type="password"/>
<!-- Password Visibility Toggle -->
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600" data-purpose="password-visibility-toggle" id="toggle-password" type="button">
<i class="fas fa-eye" id="eye-icon"></i>
</button>
</div>
</div>
<!-- BEGIN: ActionButtons -->
<div class="space-y-3 pt-2">
<!-- Login Button -->
<button class="w-full flex items-center justify-center gap-2 bg-[#2563eb] hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-all duration-200" data-purpose="submit-button" type="submit">
<i class="fas fa-sign-in-alt"></i>
<span>Ingresar</span>
</button>
<!-- Exit Button -->
<button class="w-full flex items-center justify-center gap-2 bg-[#e2e8f0] hover:bg-slate-300 text-slate-700 font-semibold py-3 px-4 rounded-lg shadow-sm transition-all duration-200" data-purpose="exit-button" onclick="window.history.back()" type="button">
<i class="fas fa-sign-out-alt text-red-600"></i>
<span>Salir</span>
</button>
</div>
<!-- END: ActionButtons -->
</form>
<!-- END: LoginForm -->
</main>
<!-- END: LoginCard -->
<!-- BEGIN: Scripts -->
<script data-purpose="event-handlers">
    document.addEventListener('DOMContentLoaded', () => {
      const passwordInput = document.getElementById('contrasena');
      const toggleButton = document.getElementById('toggle-password');
      const eyeIcon = document.getElementById('eye-icon');
      const loginForm = document.getElementById('login-form');

      /**
       * Handle password visibility toggle logic
       */
      toggleButton.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle icon classes
        if (type === 'text') {
          eyeIcon.classList.remove('fa-eye');
          eyeIcon.classList.add('fa-eye-slash');
        } else {
          eyeIcon.classList.remove('fa-eye-slash');
          eyeIcon.classList.add('fa-eye');
        }
      });

      /**
       * Prevent default form submission for demonstration
       */
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const usuario = document.getElementById('usuario').value;
        console.log('Iniciando sesión para:', usuario);
        alert('Intento de inicio de sesión recibido para: ' + usuario);
      });
    });
  </script>
<!-- END: Scripts -->
</body></html>
